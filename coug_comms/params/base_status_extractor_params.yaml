base_status_extractor_node:
  # --- ROS Topics ---
  status_topic:
    type: string
    default_value: "base/agent/status"
    validation:
      not_empty<>: []
  odom_topic:
    type: string
    default_value: "base/odometry/global"
    validation:
      not_empty<>: []
  depth_topic:
    type: string
    default_value: "base/odometry/depth"
    validation:
      not_empty<>: []
  imu_topic:
    type: string
    default_value: "base/imu/data"
    validation:
      not_empty<>: []
