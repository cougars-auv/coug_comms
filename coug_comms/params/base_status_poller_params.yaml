base_status_poller_node:
  # --- Node Settings ---
  publish_diagnostics:
    type: bool
    default_value: false
  diagnostic_timeout_sec:
    type: double
    default_value: 10.0
    validation:
      gt<>: [0.0]

  lead_agent:
    type: string
    default_value: ""
  enable_direct_comms:
    type: bool
    default_value: true
  enable_acoustic_comms:
    type: bool
    default_value: true
  direct_timeout_sec:
    type: double
    default_value: 2.0
    validation:
      gt<>: [0.0]
  tick_period_sec:
    type: double
    default_value: 0.05
    validation:
      gt<>: [0.0]
  poll_period_sec:
    type: double
    default_value: 0.0
    validation:
      gt_eq<>: [0.0]
  response_timeout_sec:
    type: double
    default_value: 5.0
    validation:
      gt<>: [0.0]

  # --- ROS Topics and Frames ---
  modem_send_topic:
    type: string
    default_value: "modem_send"
    validation:
      not_empty<>: []
  modem_rec_topic:
    type: string
    default_value: "modem_rec"
    validation:
      not_empty<>: []
  modem_cmd_update_topic:
    type: string
    default_value: "modem_cmd_update"
    validation:
      not_empty<>: []

  status_topic:
    type: string
    default_value: "base/agent/status"
    validation:
      not_empty<>: []
  direct_status_topic:
    type: string
    default_value: "agent/status"
    validation:
      not_empty<>: []

  use_parameter_frame:
    type: bool
    default_value: false
  parameter_frame:
    type: string
    default_value: "modem_link"
    validation:
      not_empty<>: []
