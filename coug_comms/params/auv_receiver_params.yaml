auv_receiver_node:
  # --- Node Settings ---
  publish_diagnostics:
    type: bool
    default_value: false
  service_history_size:
    type: int
    default_value: 5
    validation:
      gt<>: [0]

  # --- ROS Topics and Services ---
  modem_rec_topic:
    type: string
    default_value: "modem_rec"
    validation:
      not_empty<>: []

  start_service:
    type: string
    default_value: "start"
    validation:
      not_empty<>: []
  stop_service:
    type: string
    default_value: "stop"
    validation:
      not_empty<>: []
  surface_service:
    type: string
    default_value: "surface"
    validation:
      not_empty<>: []
  home_service:
    type: string
    default_value: "home"
    validation:
      not_empty<>: []
  emergency_stop_service:
    type: string
    default_value: "emergency_stop"
    validation:
      not_empty<>: []
  emergency_surface_service:
    type: string
    default_value: "emergency_surface"
    validation:
      not_empty<>: []
