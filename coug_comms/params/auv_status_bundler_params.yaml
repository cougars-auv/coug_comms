auv_status_bundler_node:
  # --- Node Settings ---
  publish_rate_hz:
    type: double
    default_value: 10.0
    validation:
      gt<>: [0.0]

  # --- ROS Topics ---
  status_topic:
    type: string
    default_value: "agent/status"
    validation:
      not_empty<>: []
  odom_topic:
    type: string
    default_value: "odometry/global"
    validation:
      not_empty<>: []
  depth_topic:
    type: string
    default_value: "depth/odometry"
    validation:
      not_empty<>: []
  imu_topic:
    type: string
    default_value: "imu/data"
    validation:
      not_empty<>: []

  base_frame:
    type: string
    default_value: "base_link"
    validation:
      not_empty<>: []
