base_dispatcher_node:
  # --- Node Settings ---
  publish_diagnostics:
    type: bool
    default_value: false
  service_history_size:
    type: int
    default_value: 5
    validation:
      gt<>: [0]

  lead_agent:
    type: string
    default_value: ""
  enable_direct_comms:
    type: bool
    default_value: true
  enable_acoustic_comms:
    type: bool
    default_value: true
  direct_timeout_sec:
    type: double
    default_value: 2.0
    validation:
      gt<>: [0.0]

  # --- ROS Topics and Services ---
  modem_send_topic:
    type: string
    default_value: "modem_send"
    validation:
      not_empty<>: []

  start_service:
    type: string
    default_value: "base/start"
    validation:
      not_empty<>: []
  stop_service:
    type: string
    default_value: "base/stop"
    validation:
      not_empty<>: []
  surface_service:
    type: string
    default_value: "base/surface"
    validation:
      not_empty<>: []
  home_service:
    type: string
    default_value: "base/home"
    validation:
      not_empty<>: []
  emergency_stop_service:
    type: string
    default_value: "base/emergency_stop"
    validation:
      not_empty<>: []
  emergency_surface_service:
    type: string
    default_value: "base/emergency_surface"
    validation:
      not_empty<>: []

  direct_status_topic:
    type: string
    default_value: "agent/status"
    validation:
      not_empty<>: []
  direct_start_service:
    type: string
    default_value: "start"
    validation:
      not_empty<>: []
  direct_stop_service:
    type: string
    default_value: "stop"
    validation:
      not_empty<>: []
  direct_surface_service:
    type: string
    default_value: "surface"
    validation:
      not_empty<>: []
  direct_home_service:
    type: string
    default_value: "home"
    validation:
      not_empty<>: []
  direct_emergency_stop_service:
    type: string
    default_value: "emergency_stop"
    validation:
      not_empty<>: []
  direct_emergency_surface_service:
    type: string
    default_value: "emergency_surface"
    validation:
      not_empty<>: []
